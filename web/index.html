<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>llm-wiki-agent</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #1a1a2e; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column;
}
.header {
  padding: 12px 20px; background: #16213e; border-bottom: 1px solid #0f3460;
  display: flex; align-items: center; gap: 12px; flex-shrink: 0;
}
.header h1 { font-size: 16px; font-weight: 600; color: #e94560; margin-right: auto; }
.header select {
  background: #1a1a2e; color: #e0e0e0; border: 1px solid #0f3460; border-radius: 6px;
  padding: 6px 12px; font-size: 13px; outline: none; cursor: pointer;
}
#messages {
  flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px;
}
.msg { max-width: 80%; padding: 12px 16px; border-radius: 12px; line-height: 1.5; font-size: 14px; }
.msg.user { background: #0f3460; align-self: flex-end; border-bottom-right-radius: 4px; }
.msg.assistant { background: #16213e; align-self: flex-start; border-bottom-left-radius: 4px; }
.msg.tool { background: #1a1a2e; border: 1px solid #0f3460; align-self: flex-start; font-size: 12px; color: #888; }
.msg.tool .tool-name { color: #e94560; font-weight: 600; }
.msg .thinking { color: #888; font-style: italic; font-size: 12px; padding: 8px; margin: 8px 0; background: #111; border-radius: 6px; display: none; }
.msg .thinking.visible { display: block; }
.msg code { background: #111; padding: 2px 6px; border-radius: 4px; font-size: 13px; }
.msg pre { background: #111; padding: 12px; border-radius: 8px; overflow-x: auto; margin: 8px 0; }
.msg pre code { background: none; padding: 0; }
.msg a { color: #4fc3f7; }
.input-area {
  padding: 16px 20px; background: #16213e; border-top: 1px solid #0f3460;
  display: flex; gap: 12px; flex-shrink: 0;
}
.input-area textarea {
  flex: 1; background: #1a1a2e; color: #e0e0e0; border: 1px solid #0f3460;
  border-radius: 8px; padding: 10px 14px; font-size: 14px; resize: none;
  outline: none; font-family: inherit; min-height: 42px; max-height: 120px;
}
.input-area button {
  background: #e94560; color: #fff; border: none; border-radius: 8px;
  padding: 10px 20px; font-size: 14px; cursor: pointer; font-weight: 600;
  transition: background 0.2s; align-self: flex-end;
}
.input-area button:hover { background: #c73652; }
.input-area button:disabled { background: #555; cursor: not-allowed; }
.loading { text-align: center; color: #888; padding: 40px; font-size: 14px; }
.loading .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid #333; border-top-color: #e94560; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 8px; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="header">
  <h1>llm-wiki-agent</h1>
  <select id="model-select"><option value="">Loading models...</option></select>
</div>
<div id="messages">
  <div class="loading"><span class="spinner"></span>Connecting...</div>
</div>
<div class="input-area">
  <textarea id="input" placeholder="Type a message..." rows="1"></textarea>
  <button id="send-btn" disabled>Send</button>
</div>

<script>
// State
let sessionId = null;
let currentAssistantMsg = null;
let loading = false;

const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('send-btn');
const modelSelect = document.getElementById('model-select');

// Load models
async function loadModels() {
  try {
    const res = await fetch('/api/models');
    const data = await res.json();
    modelSelect.innerHTML = '';
    if (data.models && data.models.length > 0) {
      data.models.forEach(m => {
        const opt = document.createElement('option');
        opt.value = `${m.provider}/${m.id}`;
        opt.textContent = `${m.provider}/${m.id}`;
        modelSelect.appendChild(opt);
      });
    } else {
      modelSelect.innerHTML = '<option value="">No models available</option>';
    }
  } catch {
    modelSelect.innerHTML = '<option value="">Failed to load models</option>';
  }
}
loadModels();

// Auto-resize textarea
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
});

// Send message
async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text || loading) return;

  inputEl.value = '';
  inputEl.style.height = 'auto';
  loading = true;
  sendBtn.disabled = true;

  // Remove loading indicator
  const loadingEl = messagesEl.querySelector('.loading');
  if (loadingEl) loadingEl.remove();

  // Add user message
  addMessage(text, 'user');

  // Show thinking placeholder
  currentAssistantMsg = addMessage('', 'assistant');
  const thinkingDiv = document.createElement('div');
  thinkingDiv.className = 'thinking visible';
  thinkingDiv.textContent = 'Thinking...';
  currentAssistantMsg.appendChild(thinkingDiv);

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, session_id: sessionId }),
    });

    if (!res.ok) {
      const err = await res.json();
      currentAssistantMsg.innerHTML = `<strong>Error:</strong> ${err.error}`;
      loading = false;
      sendBtn.disabled = false;
      return;
    }

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n\n');
      buffer = lines.pop() || '';

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        try {
          const data = JSON.parse(line.slice(6));
          handleSSEEvent(data);
        } catch { /* skip malformed */ }
      }
    }
  } catch (err) {
    currentAssistantMsg.innerHTML = `<strong>Error:</strong> ${err.message}`;
  }

  loading = false;
  sendBtn.disabled = false;
  inputEl.focus();
}

function handleSSEEvent(data) {
  switch (data.type) {
    case 'session_id':
      sessionId = data.id;
      break;
    case 'delta':
      if (currentAssistantMsg) {
        // Remove thinking indicator on first delta
        const thinking = currentAssistantMsg.querySelector('.thinking');
        if (thinking) thinking.remove();
        appendContent(currentAssistantMsg, data.content);
      }
      break;
    case 'tool':
      addToolCall(data.name, data.args);
      break;
    case 'tool_result':
      // Could update tool call status
      break;
    case 'end':
      sessionId = data.session_id || sessionId;
      break;
    case 'error':
      if (currentAssistantMsg) {
        currentAssistantMsg.innerHTML += `<br><strong>Error:</strong> ${data.message}`;
      }
      break;
  }
}

function addMessage(text, type) {
  const el = document.createElement('div');
  el.className = `msg ${type}`;
  if (text) {
    if (type === 'assistant') {
      el.innerHTML = renderMarkdown(text);
    } else {
      el.textContent = text;
    }
  }
  messagesEl.appendChild(el);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return el;
}

function addToolCall(name, args) {
  const el = document.createElement('div');
  el.className = 'msg tool';
  const argsStr = typeof args === 'object' ? JSON.stringify(args).slice(0, 80) : String(args).slice(0, 80);
  el.innerHTML = `🔧 <span class="tool-name">${name}</span> ${argsStr}...`;
  messagesEl.appendChild(el);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function appendContent(el, text) {
  // Simple approach: append text and re-render markdown
  // Get current text content, append, re-render
  const currentText = el.textContent;
  el.innerHTML = renderMarkdown(currentText + text);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function renderMarkdown(text) {
  // Very simple markdown renderer
  let html = escapeHtml(text);
  // Code blocks
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
  // Inline code
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  // Bold
  html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  // Links
  html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
  // Line breaks
  html = html.replace(/\n/g, '<br>');
  return html;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// Enter to send, Shift+Enter for newline
inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

sendBtn.addEventListener('click', sendMessage);

// Enable send after load
sendBtn.disabled = false;
inputEl.focus();
</script>
</body>
</html>
