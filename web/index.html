<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>llm-wiki-agent</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #1a1a2e; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column;
}
.header {
  padding: 12px 20px; background: #16213e; border-bottom: 1px solid #0f3460;
  display: flex; align-items: center; gap: 12px; flex-shrink: 0;
}
.header h1 { font-size: 16px; font-weight: 600; color: #e94560; margin-right: auto; }
.header select {
  background: #1a1a2e; color: #e0e0e0; border: 1px solid #0f3460; border-radius: 6px;
  padding: 6px 12px; font-size: 13px; outline: none; cursor: pointer;
}
#messages {
  flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px;
}
.msg { max-width: 80%; padding: 12px 16px; border-radius: 12px; line-height: 1.5; font-size: 14px; }
.msg.user { background: #0f3460; align-self: flex-end; border-bottom-right-radius: 4px; }
.msg.assistant { background: #16213e; align-self: flex-start; border-bottom-left-radius: 4px; }
.msg .thinking { color: #888; font-style: italic; font-size: 12px; padding: 8px; margin: 8px 0; background: #111; border-radius: 6px; display: none; }
.msg .thinking.visible { display: block; }
.thinking .spinner {
  display: inline-block; width: 14px; height: 14px;
  border: 2px solid #444; border-top-color: #e94560;
  border-radius: 50%; animation: spin 0.8s linear infinite;
  vertical-align: middle; margin-right: 6px;
}
.thinking .dots::after {
  content: '...';
  animation: dots 1.5s steps(4) infinite;
}
@keyframes dots {
  0% { content: ''; }
  25% { content: '.'; }
  50% { content: '..'; }
  75% { content: '...'; }
}
.msg.tool-block {
  background: #1a1a2e; border: 1px solid #0f3460;
  align-self: flex-start; font-size: 12px; color: #888;
  padding: 0;
}
.tool-header {
  padding: 8px 12px; cursor: pointer; user-select: none;
  display: flex; align-items: center; gap: 6px;
}
.tool-header:hover { background: #222; }
.tool-toggle { font-size: 10px; transition: transform 0.2s; }
.tool-toggle.collapsed { transform: rotate(-90deg); }
.tool-body { padding: 0 12px 8px; }
.tool-line { padding: 2px 0; }
.tool-body.collapsed { display: none; }
.msg code { background: #111; padding: 2px 6px; border-radius: 4px; font-size: 13px; }
.msg pre { background: #111; padding: 12px; border-radius: 8px; overflow-x: auto; margin: 8px 0; }
.msg pre code { background: none; padding: 0; }
.msg a { color: #4fc3f7; }
.msg h1, .msg h2, .msg h3 { margin: 12px 0 6px; }
.msg h1 { font-size: 18px; }
.msg h2 { font-size: 16px; }
.msg h3 { font-size: 15px; }
.msg ul, .msg ol { padding-left: 20px; margin: 8px 0; }
.msg li { margin: 4px 0; }
.msg blockquote { border-left: 3px solid #e94560; padding-left: 12px; margin: 8px 0; color: #888; }
.msg table { border-collapse: collapse; margin: 8px 0; }
.msg th, .msg td { border: 1px solid #0f3460; padding: 6px 10px; }
.msg th { background: #0f3460; }
.msg hr { border: none; border-top: 1px solid #0f3460; margin: 12px 0; }
.input-area {
  padding: 16px 20px; background: #16213e; border-top: 1px solid #0f3460;
  display: flex; gap: 12px; flex-shrink: 0;
}
.input-area textarea {
  flex: 1; background: #1a1a2e; color: #e0e0e0; border: 1px solid #0f3460;
  border-radius: 8px; padding: 10px 14px; font-size: 14px; resize: none;
  outline: none; font-family: inherit; min-height: 42px; max-height: 120px;
}
.input-area button {
  background: #e94560; color: #fff; border: none; border-radius: 8px;
  padding: 10px 20px; font-size: 14px; cursor: pointer; font-weight: 600;
  transition: background 0.2s; align-self: flex-end;
}
.input-area button:hover { background: #c73652; }
.input-area button:disabled { background: #555; cursor: not-allowed; }
.loading { text-align: center; color: #888; padding: 40px; font-size: 14px; }
.loading .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid #333; border-top-color: #e94560; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 8px; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="header">
  <h1>llm-wiki-agent</h1>
</div>
<div id="messages">
  <div class="msg assistant" style="opacity:0.7">输入消息开始与 wiki 交互</div>
</div>
<div class="input-area">
  <textarea id="input" placeholder="Type a message..." rows="1"></textarea>
  <button id="send-btn" disabled>Send</button>
</div>

<script src="js/render.js"></script>
<script src="js/app.js"></script>
</body>
</html>
